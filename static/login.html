<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ByteMe Arena — Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
        justify-content: center;
        overflow: hidden;
        gap: 2rem;
    }

    #glitter-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
    }

    .glow-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
        z-index: 0;
        animation: float-orb 12s ease-in-out infinite alternate;
    }

    .orb-pink { width: 300px; height: 300px; background-color: #ff1493; top: -80px; left: -60px; }
    .orb-orchid { width: 250px; height: 250px; background-color: #da70d6; bottom: -60px; right: -40px; animation-delay: -4s; }
    .orb-magenta { width: 200px; height: 200px; background-color: #ff69b4; top: 40%; left: 60%; animation-delay: -8s; }

    @keyframes float-orb {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, -20px) scale(1.1); }
    }

    h1 {
        font-size: 3rem;
        z-index: 10;
        color: #ff69b4;
    }

    p {
        color: #c8a0b8;
        font-size: 1.1rem;
        z-index: 10;
    }

    .camera-container {
        position: relative;
        border-radius: 14px;
        overflow: hidden;
        border: 2px solid #ff69b444;
        box-shadow: 0 0 40px #ff69b422;
        z-index: 10;
    }

    video {
        display: block;
        width: 360px;
        height: 270px;
        background-color: #1a0a12;
        transform: scaleX(-1);
    }
</style>
</head>
<body>
    <div class="glow-orb orb-pink"></div>
    <div class="glow-orb orb-orchid"></div>
    <div class="glow-orb orb-magenta"></div>
    <canvas id="glitter-canvas"></canvas>

    <h1>ByteMe Arena</h1>
    <p>Look at the camera and press Login</p>
    
    <div class="camera-container">
        <video id="camera-video" autoplay playsinline muted></video>
    </div>
    
    <canvas id="snapshot-canvas" width="360" height="270" style="display: none;"></canvas>
    
    <button id="login-button" disabled>Login</button>
    <div id="login-message" class="message"></div>
    
    <a href="/leaderboard-page" style="z-index: 10;">View Leaderboard</a>

    <script>
        const canvas = document.getElementById('glitter-canvas');
        const context = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const particles = Array.from({ length: 70 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 2.5 + 0.5,
            speedX: (Math.random() - 0.5) * 0.3,
            speedY: (Math.random() - 0.5) * 0.3,
            opacity: Math.random(),
            fadeSpeed: Math.random() * 0.015 + 0.005,
            hue: Math.random() > 0.5 ? 330 : 300
        }));

        function animateGlitter() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.x = (particle.x + particle.speedX + canvas.width) % canvas.width;
                particle.y = (particle.y + particle.speedY + canvas.height) % canvas.height;
                particle.opacity += particle.fadeSpeed;
                
                if (particle.opacity > 1 || particle.opacity < 0) {
                    particle.fadeSpeed *= -1;
                }
                
                context.beginPath();
                context.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                context.fillStyle = `hsla(${particle.hue}, 100%, 75%, ${Math.max(0, particle.opacity)})`;
                context.fill();
                
                if (particle.radius > 1.5 && particle.opacity > 0.5) {
                    context.strokeStyle = `hsla(${particle.hue}, 100%, 85%, ${particle.opacity * 0.4})`;
                    context.lineWidth = 0.5;
                    context.beginPath();
                    context.moveTo(particle.x - particle.radius * 2, particle.y);
                    context.lineTo(particle.x + particle.radius * 2, particle.y);
                    context.moveTo(particle.x, particle.y - particle.radius * 2);
                    context.lineTo(particle.x, particle.y + particle.radius * 2);
                    context.stroke();
                }
            });
            
            requestAnimationFrame(animateGlitter);
        }
        
        animateGlitter();

        const videoElement = document.getElementById('camera-video');
        const snapshotCanvas = document.getElementById('snapshot-canvas');
        const loginButton = document.getElementById('login-button');
        const messageDisplay = document.getElementById('login-message');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    loginButton.disabled = false;
                    messageDisplay.textContent = 'Camera ready';
                };
            })
            .catch(() => {
                messageDisplay.textContent = 'Camera failed';
            });

        loginButton.addEventListener('click', async () => {
            messageDisplay.textContent = 'Verifying...';
            loginButton.disabled = true;

            const context = snapshotCanvas.getContext('2d');
            context.drawImage(videoElement, 0, 0, 360, 270);
            const imageBase64 = snapshotCanvas.toDataURL('image/jpeg').split(',')[1];
            
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ image: imageBase64 })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDisplay.textContent = `Welcome ${data.name}`;
                    setTimeout(() => {
                        window.location.href = '/lobby';
                    }, 800);
                } else {
                    messageDisplay.textContent = data.error;
                    loginButton.disabled = false;
                }
            } catch (error) {
                messageDisplay.textContent = 'Network error occurred';
                loginButton.disabled = false;
            }
        });
    </script>
</body>
</html>
